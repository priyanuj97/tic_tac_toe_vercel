<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="overlay" class="overlay hidden"></div>
    <div id="playerModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="playerModalTitle">
        <div class="modal-card">
            <h1 id="playerModalTitle">Enter player names</h1>
            <p>Choose names for X and O before the match starts.</p>
            <form id="playerForm" class="player-form">
                <label for="playerX">Player X</label>
                <input id="playerX" name="playerX" type="text" placeholder="Player X" autocomplete="off">
                <label for="playerO">Player O</label>
                <input id="playerO" name="playerO" type="text" placeholder="Player O" autocomplete="off">
                <button type="submit" class="btn btn-primary">Start match</button>
            </form>
        </div>
    </div>

    <main class="app">
        <section class="game">
            <h1>Tic Tac Toe</h1>
            <div id="status" class="status">Player X's turn</div>
            <div id="board" class="board" role="grid">
                <!-- 9 cells generated by JS if JS disabled show fallback -->
                <button class="cell" data-index="0"></button>
                <button class="cell" data-index="1"></button>
                <button class="cell" data-index="2"></button>
                <button class="cell" data-index="3"></button>
                <button class="cell" data-index="4"></button>
                <button class="cell" data-index="5"></button>
                <button class="cell" data-index="6"></button>
                <button class="cell" data-index="7"></button>
                <button class="cell" data-index="8"></button>
            </div>
            <div class="controls">
                <button id="resetBtn" class="btn">Reset</button>
            </div>
            <div class="score"></div>
        </section>
    </main>
    <script src="index.js" defer></script>
</body>
</html>
